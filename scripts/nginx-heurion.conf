# Nginx reverse proxy for Heurion production
# Cloudflare SSL/TLS mode = Full (origin must speak HTTPS with any cert).

server {
    listen 80;
    server_name heurion.org www.heurion.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name heurion.org www.heurion.org;

    ssl_certificate /etc/nginx/ssl/heurion.crt;
    ssl_certificate_key /etc/nginx/ssl/heurion.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static web UI
    location / {
        root /root/heurion/packages/web/dist;
        try_files $uri $uri/ /index.html;
    }

    # API + SSE proxy to the TS backend
    location /api/ {
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Health check endpoint
    location /healthz {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
    }

    # WebSocket/SSE thinking stream
    location /api/v1/agent/thinking/stream {
        proxy_pass http://localhost:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}

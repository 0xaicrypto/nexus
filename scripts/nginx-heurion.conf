# Nginx reverse proxy for Heurion production + staging
# Cloudflare SSL/TLS mode = Full (origin must speak HTTPS with any cert).

# ── Production ──
server {
    listen 80;
    server_name heurion.org www.heurion.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name heurion.org www.heurion.org;

    ssl_certificate /etc/nginx/ssl/heurion.crt;
    ssl_certificate_key /etc/nginx/ssl/heurion.key;

    client_max_body_size 500M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / { root /root/heurion/packages/web/dist; try_files $uri $uri/ /index.html; }
    location /api/ { proxy_pass http://localhost:8001; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Connection ""; proxy_buffering off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; }
    location /healthz { proxy_pass http://localhost:8001; proxy_set_header Host $host; }
}

# ── Staging ──
server {
    listen 80;
    server_name staging.heurion.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.heurion.org;

    ssl_certificate /etc/nginx/ssl/heurion.crt;
    ssl_certificate_key /etc/nginx/ssl/heurion.key;

    client_max_body_size 500M;

    # Build web from latest main for staging preview
    location / {
        root /root/heurion/packages/web/dist;
        try_files $uri $uri/ /index.html;
    }
    location /api/ { proxy_pass http://localhost:8002; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Connection ""; proxy_buffering off; proxy_read_timeout 3600s; proxy_send_timeout 3600s; }
    location /healthz { proxy_pass http://localhost:8002; proxy_set_header Host $host; }
}

name: Deploy Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '9' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm', cache-dependency-path: packages/server-ts/pnpm-lock.yaml }
      - run: cd packages/server-ts && pnpm install --frozen-lockfile && npx prisma generate && npx tsc --noEmit

  test:
    name: Unit Tests
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '9' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm', cache-dependency-path: packages/server-ts/pnpm-lock.yaml }
      - run: cd packages/server-ts && pnpm install --frozen-lockfile && npx prisma generate && npx vitest run

  staging:
    name: Staging + Regression
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Deploy staging + regression
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          scp -o StrictHostKeyChecking=no scripts/deploy-staging.sh scripts/regression-test.sh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/heurion/scripts/
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd ~/heurion && DEEPSEEK_KEY=$DEEPSEEK_KEY GEMINI_KEY=$GEMINI_KEY bash scripts/deploy-staging.sh && bash scripts/regression-test.sh http://localhost:8002"

  cloudflare-ssl:
    name: Cloudflare SSL
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: Set Cloudflare SSL to Full
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$ZONE_ID" ]; then exit 0; fi
          CURRENT=$(curl -sS "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/ssl" -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['value'])")
          if [ "$CURRENT" != "full" ] && [ "$CURRENT" != "strict" ]; then
            curl -sS -X PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/settings/ssl" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d '{"value":"full"}'
          fi

  e2e:
    name: E2E Browser Tests
    needs: [staging]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Run Playwright E2E on staging
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/heurion/packages/server-ts
            npx tsx tests/fixtures/seed.ts http://localhost:8002
            echo '--- playwright binary ---'
            which playwright || echo 'not found in PATH'
            ls -la node_modules/.bin/playwright 2>/dev/null || echo 'not found in .bin'
            ls node_modules/.pnpm/*/node_modules/playwright/*.js 2>/dev/null || echo 'no playwright in .pnpm'
            echo '--- running tests ---'
            npx playwright test --config=playwright.config.ts
          "

  deploy:
    name: Deploy to Production
    needs: [staging, cloudflare-ssl]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://heurion.org
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Deploy production
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'DEEPSEEK_KEY=$DEEPSEEK_KEY bash -s' < scripts/deploy.sh

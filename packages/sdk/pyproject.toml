[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nexus-core"
version = "0.5.0"
description = "Nexus SDK — Persistent Agent Infrastructure"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
include = ["nexus_core*"]

# ── Non-Python data files shipped inside the wheel ───────────────────
[tool.setuptools.package-data]
"nexus_core.skills" = ["*.json"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

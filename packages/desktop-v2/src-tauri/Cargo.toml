[package]
name = "nexus-desktop-v2"
version = "0.1.5"
description = "Nexus desktop — clinical workflow agent"
authors = ["JZ"]
edition = "2021"
rust-version = "1.77"

# https://crates.io/categories/development-tools::build-utils
[lib]
name = "nexus_desktop_v2_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
# Use the loosest "2" constraint so cargo always pulls the latest 2.x
# patch release. macOS-26 (Tahoe) compatibility fixes for tao + wry
# land in the dependency tree this way without us pinning a specific
# patch version every time Apple ships a new OS.
tauri-build = { version = "2", features = [] }

[dependencies]
# Pre-2026-06-14 we pinned ``tauri = "2.1"`` which resolved to tao
# 0.35.x / wry 0.55.x — both of which panic inside
# ``did_finish_launching`` on macOS 26.5.1 with an ``Abort trap: 6``
# before our ``setup()`` callback ever fires. Bumping the requirement
# to plain ``"2"`` lets cargo pick the latest available 2.x (2.11+
# at the time of writing), which transitively brings in newer tao /
# wry with the macOS 26 NSApplicationDelegate fixes.
#
# If you have to roll back: also re-pin tauri-plugin-* below, and
# ``cargo update`` to refresh the lockfile.
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-log = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"

# F24 — earlier F22 used the ``keyring`` crate for OS Keychain
# integration, but that triggered a macOS Keychain permission dialog
# on first launch (cost: one system prompt the medic doesn't expect).
# The actual data we store is a UUID user_id — not a secret in the
# password sense. Storing it in the backend's own user-data dir
# (``$RUNE_HOME/identity.json``, owned by the macOS user account)
# gives the same per-user isolation with ZERO permission prompts.
# See packages/server/nexus_server/auth/routes.py local-bootstrap.

[features]
# this feature is used for production builds or when `devUrl` points to localhost
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

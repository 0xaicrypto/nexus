# Alembic configuration for nexus_server.
#
# We DON'T use the standard top-of-repo alembic.ini layout because the
# Python binary is shipped via PyInstaller. Keeping alembic.ini +
# env.py + versions/ all under nexus_server/migrations/ means they get
# included automatically by the PyInstaller spec's package walk --
# which uses ``--collect-data nexus_server.migrations`` (see
# nexus-server.spec).
#
# DB URL is set programmatically by env.py from ServerConfig.DATABASE_URL
# at runtime -- the line below is a placeholder, overwritten by env.py.
#
# F-alembic-ascii: this file MUST stay pure ASCII. Tauri-spawned sidecar
# processes on a fresh Mac inherit LANG=C (no LC_ALL set), and Python's
# configparser.read() then defaults to the ASCII codec. Any em-dash /
# CJK comment / smart-quote here will crash startup with
# UnicodeDecodeError. Keep punctuation -- ASCII -- only.

[alembic]
script_location = %(here)s
sqlalchemy.url = sqlite:///:memory:
prepend_sys_path = .
# Filename template: NNNN_<slug>.py  (4-digit zero-padded counter
# instead of Alembic's default UUIDs, so file ordering is obvious).
# Keep this file pure ASCII -- see header note.
file_template = %%(rev)s_%%(slug)s
version_path_separator = os
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S

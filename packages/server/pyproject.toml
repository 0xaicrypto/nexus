[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nexus-server"
version = "0.1.0"
description = "Nexus FastAPI server: multi-tenant HTTP frontend for the Nexus DigitalTwin"
# Per-package READMEs were consolidated into the root README.md.
requires-python = ">=3.10"
authors = [
    {name = "Nexus Team", email = "team@nexus.ai"}
]
dependencies = [
    "fastapi>=0.100",
    "uvicorn[standard]>=0.23",
    "pyjwt>=2.8",
    # Password auth (2026-07 redesign): bcrypt hashes for
    # /auth/register|login|claim + admin reset-password.
    "bcrypt>=4",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "nexus-core>=0.4.0",
    "nexus>=0.1.0",
    "google-genai>=1.0.0",
    # OpenAI SDK is required for BOTH the openai provider and the Kimi
    # (Moonshot) provider — Kimi rides the OpenAI-compatible API via
    # AsyncOpenAI(base_url=...). Hard dep so provider switching in the
    # settings UI Just Works without a manual pip install.
    "openai>=1.0",
    "httpx>=0.25.0",
    # Used by attachment_distiller to pull text out of PDF uploads. Soft
    # dependency in code (the distiller falls back to a binary stub if
    # missing) but a hard dep here so a fresh `uv sync` Just Works for
    # the typical product flow where users attach papers / PDFs.
    "pypdf>=4.0",
    # U3.4 — Alembic-based schema migrations. We do NOT use SQLAlchemy
    # models; migrations are hand-rolled raw SQL via op.execute(). Only
    # the migration runner + version tracking come from Alembic. See
    # nexus_server/migrations/ for the env.py + versions/.
    "alembic>=1.13",
    "sqlalchemy>=2.0",   # alembic hard-deps on this; we only use its Engine
    # Required by FastAPI to parse multipart/form-data on the
    # /api/v1/files/upload endpoint (UploadFile depends on it). Without
    # this, FastAPI raises at route-registration time, breaking every
    # other route too — so it's a hard dep, not optional.
    "python-multipart>=0.0.9",
    # Stripe billing SDK — checkout sessions, customer portal,
    # webhook event verification. Hard dep so "STRIPE_SECRET_KEY
    # configured but stripe module missing" is impossible.
    "stripe>=7.0",
    # #135 — vector index for semantic memory search. sqlite-vec is a
    # SQLite extension that adds vec0 virtual tables for k-NN over
    # float32 vectors; lives in the same .db file as the rest of
    # state. Hard dep so semantic search either works or fails fast
    # (search_chunks raises EmbeddingUnavailable) — never silently
    # degrades to lexical without telling the agent.
    "sqlite-vec>=0.1.6",
    # #140 — DICOM medical imaging stack. pydicom parses .dcm files +
    # zip archives, pylibjpeg handles the JPEG2000 / JPEG-LS transfer
    # syntaxes hospital PACS commonly export, Pillow renders the
    # final slice/MIP/grid PNGs we ship to vision LLMs. Hard deps
    # because medical imaging is a core product capability — we'd
    # rather fail at install than silently degrade to "DICOM not
    # supported" the moment a medic drops their first zip.
    "pydicom>=3.0",
    "pylibjpeg>=2.0",
    "pylibjpeg-libjpeg>=2.0",
    "pylibjpeg-openjpeg>=2.0",
    "numpy>=1.24",
    "pillow>=10.0",
    # #145 — SAM (Segment Anything) auto-segmentation runs locally
    # via ONNX. onnxruntime is CPU-only by default (~10 MB wheel);
    # GPU variant is opt-in via NEXUS_SAM_PROVIDER=cuda. scikit-image
    # is used by the mask→polygon converter (marching squares).
    "onnxruntime>=1.16",
    "scikit-image>=0.21",
    # #126 — pytesseract is now a hard dep so the python side is
    # always present; the tesseract SYSTEM BINARY (brew install
    # tesseract) is still installed at runtime by setup.sh's macOS
    # path. The tool returns a graceful "tesseract not found"
    # error if the binary is missing, so the agent's chat turn
    # never crashes — it just falls back to vision.
    "pytesseract>=0.3",
    # Report PDF export — ReportMode's Export-PDF button calls
    # /api/v1/report/pdf which builds a clinical report via reportlab's
    # Platypus framework. Chose reportlab over weasyprint because it's
    # pure-Python (no Pango/Cairo native dylibs to bundle through
    # PyInstaller — we've already burned days on PyInstaller native-lib
    # bundling issues for macOS 26 / alembic.ini path resolution).
    # ~10 MB wheel, ships cleanly in the .app.
    "reportlab>=4.0",
    # Research Workspace report generators (Phase 4). python-docx
    # renders the interim report .docx, openpyxl writes the
    # de-identified cohort .xlsx, matplotlib draws the KM curve PNG +
    # CONSORT diagram. Hard deps so the .dmg ships them automatically;
    # without them research.reports falls back to markdown / SVG-only,
    # which is degraded UX for the doctor.
    "python-docx>=1.1",
    "openpyxl>=3.1",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
llm-extra = [
    "openai>=1.0",
    "anthropic>=0.7",
]
# #126 — OCR backend for the ocr_image tool. Optional because the
# tesseract system binary needs to be installed separately
# (`brew install tesseract` on macOS, `apt install tesseract-ocr`
# on Debian). The tool's _probe_ocr falls back gracefully when
# either piece is missing; vision multimodal always works.
ocr = [
    "pytesseract>=0.3",
    "pillow>=10.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.0.280",
    "mypy>=1.0",
]

[project.scripts]
nexus-server = "nexus_server.main:run_server"

[tool.uv.sources]
nexus-core = { workspace = true }
nexus = { workspace = true }

[tool.setuptools.packages.find]
# Auto-discover all subpackages (nexus_server, nexus_server.auth, etc).
# Previously this was a hand-maintained `packages = ["nexus_server"]`,
# which only included the top-level package. Subdirectories that ARE
# real Python packages (like nexus_server/auth/, with its own
# __init__.py + routes.py) got dropped on install,
# and the runtime import `from nexus_server.auth import get_current_user`
# blew up with ModuleNotFoundError. `find` recursively picks up every
# directory containing __init__.py, so new subpackages auto-ship.
where = ["."]
include = ["nexus_server*"]

# Ship the starter pack assets (workflow.json + skill .md files) as
# data alongside the Python code. Without this, ``starter_packs.py``
# resolves PACKS_ROOT to a path that doesn't exist in the installed
# wheel — the runtime install_pack() call would 500 with "Pack assets
# missing on disk". Recursive globs catch everything in
# nexus_server/starter_packs/, present and future.
[tool.setuptools.package-data]
"nexus_server" = [
    "starter_packs/**/*.json",
    "starter_packs/**/*.md",
    "starter_packs/**/*.yaml",
    # #96 fix: BUILD_INFO is stamped by build-macos.sh inside the
    # bundle's nexus_server/ dir. Without this glob, pip's install
    # phase skips it (non-.py files aren't copied by default) and
    # the server reports build=0/version=dev at runtime even on a
    # freshly built .dmg. Listing it as package data tells pip to
    # ship the file into site-packages alongside the source.
    "BUILD_INFO",
    # #154 fix: the Cornerstone3D viewer.html (#143) is served as a
    # StaticFiles mount at /dicom-viewer/. Without this glob,
    # non-editable pip install (the `.app` bundle path) DROPS the
    # whole static/ directory — the mount registers but the file
    # isn't there, so every request 404s. Symptom: clicking the
    # chip's "View 3D" button opened a browser at the viewer URL
    # and showed `{"detail":"Not Found"}` instead of the viewer.
    # Glob covers any future assets (css/js/wasm) that get added
    # alongside dicom-viewer.html.
    "static/**/*",
    # Alembic marker file — migrations/runner.py checks for this to
    # locate the migration root, then drives alembic programmatically.
    # Without it the Docker image (non-editable install) crash-loops
    # on startup with "alembic.ini missing".
    "migrations/alembic.ini",
]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "W", "I", "N"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
